name: Release Go Binaries

on:
  push:
    paths:
      - '**.go'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tagname: ${{ steps.resolve_tag.outputs.tag }}
      version: ${{ steps.resolve_tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Extract version from main.go
        id: extract_version
        run: |
          version=$(grep -oP 'var version\s*=\s*"\K[^"]+' main.go)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Resolve tag (auto-increment patch if tag exists)
        id: resolve_tag
        run: |
          base="${{ steps.extract_version.outputs.version }}"
          major=$(echo "$base" | cut -d. -f1)
          minor=$(echo "$base" | cut -d. -f2)
          #patch=$(echo "$base" | cut -d. -f3)
          patch="0"

          candidate="v${major}.${minor}.${patch}"

          # Increment patch until we find an unused tag
          while git ls-remote --tags origin "refs/tags/${candidate}" | grep -q "${candidate}"; do
            patch=$((patch + 1))
            candidate="v${major}.${minor}.${patch}"
          done

          echo "tag=$candidate" >> $GITHUB_OUTPUT
          echo "version=${candidate#v}" >> $GITHUB_OUTPUT

      #- name: Create tag
      #  id: create_time_tag
      #  run: |
      #    tag=$(date +%Y-%m-%d_%H%M%S)
      #    echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}

  releases-matrix:
    name: Release Go Binary
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        goos: [linux, windows, freebsd, darwin]
        goarch: ["386", amd64, arm64, arm]
        exclude:
          - goarch: "386"
            goos: darwin
          - goarch: "arm"
            goos: darwin
        include:
          - goarch: "riscv64"
            goos: linux
    steps:
      - uses: actions/checkout@v4
      - name: Build
        uses: wangyoucao577/go-release-action@v1
        env:
          CGO_ENABLED: 0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          goversion: "1.24"
          ldflags: "-w -s -buildid= -X main.version=${{ needs.create-release.outputs.version }}"
          md5sum: false
          release_tag: ${{ needs.create-release.outputs.tagname }}
          asset_name: "cmd2api-${{ matrix.goos }}-${{ matrix.goarch }}"
          compress_assets: OFF
          #binary_name: "http-helloworld_${{ matrix.goos }}-${{ matrix.goarch }}"